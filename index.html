<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Adaptive Palette</title>
  </head>
  <body>
    <!--
      Expandable form for the LLM prompts and interactions.
    -->
    <details id="llmInteraction">
      <summary>Prompt Dialog</summary>
      <div id="llmPrompt"></div>
    </details>
    <div id="askForLlmSuggestions"></div>
    <div id="llmSuggestions"></div>

    <!--
      Entering symbols using SVG builder strings
    -->
    <div>
      <details id="SvgEntryDialog" style="margin-left: 0.5em;">
        <summary>SVG Builder String</summary>
        <div id="svgBuilderStringEntry" style="display:inline-grid;"></div>
      </details>
    </div>

    <!--
      Searching the BCI AV for symbols, displaying the search results as a palette
    -->
    <div id="SearchGlossDialog">
      <div id="searchGloss"></div>
      <div id="searchGlossResults"></div>
    </div>

    <!--
      User's main interaction area with the adaptive palette, including the input palette,
      indicators, modifiers, backup palette, and main palette display area.
    -->
    <div id="inputArea">
      <div id="input_palette"></div>
    </div>
    <div>
      <div id="indicators"></div>
    </div>
    <div>
      <div id="modifiers"></div>
    </div>
    <div class="oneRow">
      <div id="backup_palette"></div>
      <div id="mainPaletteDisplayArea">
        <script type="module">
          import "./src/client/index.js";
        </script>
      </div>
    </div>
  </body>
</html>
